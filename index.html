<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heshani & Sarith</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #fdfaf6;
    text-align: center;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.7)),
    url('https://raw.githubusercontent.com/sarithwiksitha98/wedding-invitation/main/WhatsApp%20Image%202026-05-05%20at%2010.04.03.jpeg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.hero h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: #c6a55b;
}

.hero p {
    letter-spacing: 4px;
    color: #555;
}

#guestDisplay {
    margin-top: 10px;
    font-size: 22px;
    color: #b08d57;
}

/* SECTION */
.section {
    padding: 80px 20px;
}

h2 {
    color: #c6a55b;
}

/* INPUT BOX */
.input-box {
    margin: 10px;
    padding: 12px;
    width: 250px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border-radius: 30px;
    background: linear-gradient(to right, #d4af37, #c6a55b);
    color: white;
    text-decoration: none;
    cursor: pointer;
}

/* DETAILS */
.details {
    background: white;
    padding: 35px;
    border-radius: 20px;
    display: inline-block;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    width: 85%;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Heshani & Sarith</h1>
    <p>ENGAGEMENT CEREMONY</p>

    <!-- GUEST DISPLAY -->
    <div id="guestDisplay"></div>

    <!-- INPUTS -->
    <input id="guestName" class="input-box" placeholder="Enter Guest Name">
    <input id="guestNumber" class="input-box" placeholder="Enter WhatsApp Number (947xxxxxxxx)">

    <br>
    <button class="btn" onclick="generateInvite()">Generate Invitation</button>
</div>

<!-- STORY -->
<div class="section">
<h2>Our Story</h2>
<p>Three beautiful years of love, laughter, and memories that brought us here today.</p>
</div>

<!-- MOMENTS -->
<div class="section">
<h2>Moments</h2>
<img width="300"
src="https://raw.githubusercontent.com/sarithwiksitha98/wedding-invitation/main/WhatsApp%20Image%202026-05-05%20at%2010.04.03.jpeg">
</div>

<!-- DETAILS -->
<div class="section">
<h2>Event Details</h2>

<div class="details">
<p><strong>Date:</strong> 29th May 2026</p>
<p><strong>Time:</strong> 9.00 AM onwards</p>
<p><strong>Venue:</strong> River's Edge Hotel, Madampe</p>

<iframe
src="https://www.google.com/maps?q=Rivers%20Edge%20Hotel%20Madampe%20Sri%20Lanka&output=embed"
width="100%" height="250" style="border:0;border-radius:15px;">
</iframe>
</div>
</div>

<script>

/* SHOW NAME + SEND WHATSAPP */
function generateInvite(){

    let name = document.getElementById("guestName").value;
    let number = document.getElementById("guestNumber").value;

    if(name){
        document.getElementById("guestDisplay").innerHTML =
        "Dear " + name + ", you are warmly invited 💛";
    }

    if(number && name){
        let msg = `Dear ${name}, you are warmly invited to Heshani & Sarith's Engagement Ceremony on 29th May 2026.`;

        let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);

        window.open(url);
    }
}

</script>

</body>
</html>
